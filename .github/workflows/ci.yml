name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-typecheck-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          # ใช้ placeholder values พอสำหรับ build-time only — runtime จริงใช้ค่าจาก Vercel env vars
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: placeholder

  # ปรับใช้ audit workflow เดียวกับที่ใช้ตรวจ dependency ของโปรเจกต์อื่นอยู่แล้ว
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
